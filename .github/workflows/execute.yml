name: Ejecutar Codigo Java

on:
  workflow_run:
    workflows: ["Compilar proyectos Java"]  # Nombre del workflow de compilación
    types:
      - completed

jobs:
  execute:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      # Descargar el artefacto .jar generado
      - name: Download JAR artifact
        uses: actions/download-artifact@v3
        with:
          name: java-app  # Nombre del artefacto guardado en el primer workflow

      # Ejecutar el archivo .jar descargado
      - name: Run Java Application
        run: java -jar java-app/*.jar


