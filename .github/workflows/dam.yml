name: Compilar proyectos Java

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      className:
        description: 'Nombre de la clase con main a ejecutar'
        required: false

jobs:
  build:
  # Job 1: Construcción en cada push
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4
      # Paso 2: Configuración del JDK
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23' 
          distribution: 'temurin'
          cache: maven
          
      # Paso 3: Construcción con Maven
      - name: Build with Maven
        run: mvn -B clean package --file Programacion/javaBasics/pom.xml       
          
      - name: Save JAR file as artifact
        id: save_artifact
        uses: actions/upload-artifact@v4
        with:
          name: "javaBasics.jar"
          path: Programacion/javaBasics/target/*.jar

  # Job 2: Ejecución del archivo .jar (depende del job 'build')
  execute:
    runs-on: ubuntu-latest
    needs: build  # Solo se ejecuta si el job 'build' es exitoso

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
         name: "javaBasics.jar" # Usar el nombre de clase si se proporciona
          
      - name: Determine class to run
        id: determine_class
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            # Obtener la clase principal del POM
            CLASS_NAME=$(mvn -q help:evaluate -Dexpression=project.build.plugins[0].configuration.archive.mainClass --file Programacion/javaBasics/pom.xml | tail -1)
            echo "CLASS_NAME=$CLASS_NAME" >> $GITHUB_ENV
          else
            # Usar la clase pasada como parámetro
            CLASS_NAME="${{ github.event.inputs.className }}"
            if [ -z "$CLASS_NAME" ]; then
              # Si no se proporciona un nombre de clase, usar el del POM
              CLASS_NAME=$(mvn -q help:evaluate -Dexpression=project.build.plugins[0].configuration.archive.mainClass --file Programacion/javaBasics/pom.xml | tail -1)
            fi
            echo "CLASS_NAME=$CLASS_NAME" >> $GITHUB_ENV
          fi

      - name: Run specified Java Application
        run: |
          JAR_FILE=$(find . -name "*.jar" | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "No se encontró ningún archivo JAR."
            exit 1
          fi
          echo "Ejecutando: $CLASS_NAME"
          java -cp "$JAR_FILE" "$CLASS_NAME"

  # Job 3: Dependency Review en pull requests
  dependency_review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B package --file Programacion/javaBasics/pom.xml
        # Paso 4: Subir dependency graph para Dependabot
      - name: Dependency graph submission
        uses: actions/dependency-review-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
  
