name: Compilar proyectos Java

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      className:
        description: 'Nombre de la clase con main a ejecutar'
        required: false

jobs:
  build:
  # Job 1: Construcción en cada push
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4
      # Paso 2: Configuración del JDK
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23' 
          distribution: 'temurin'
          cache: maven
      # Paso 3: Construcción con Maven
      - name: Build with Maven
        run: mvn -B clean package --file Programacion/javaBasics/pom.xml       
          
      # Paso 4: Guardar el archivo .jar como artefacto
      - name: Save JAR file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: Programacion/javaBasics/target/*.jar

  # Job 2: Ejecución del archivo .jar (depende del job 'build')
  execute:
    runs-on: ubuntu-latest
    needs: build  # Solo se ejecuta si el job 'build' es exitoso

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      # Descargar el artefacto .jar generado
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app  # Nombre del artefacto guardado en el job 'build'
          
      # Ejecutar el archivo .jar descargado
      - name: Determine class to run
        id: determine_class
        run: |
          if [ -z "${{ github.event.inputs.className }}" ]; then
            # Si no se proporciona un nombre de clase, usar el del POM
            JAR_FILE=$(find . -name "*.jar" | head -n 1)
            CLASS_NAME=$(jar tf "$JAR_FILE" | grep -m 1 'Main-Class' | cut -d ' ' -f 2)
          else
            # Usar la clase pasada como parámetro
            CLASS_NAME="${{ github.event.inputs.className }}"
          fi
          echo "CLASS_NAME=$CLASS_NAME" >> $GITHUB_ENV  # Guardar el nombre de clase en una variable de entorno

      - name: Run specified Java Application
        run: |
          JAR_FILE=$(find . -name "*.jar" | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "No se encontró ningún archivo JAR."
            exit 1
          fi
          echo "Ejecutando: $CLASS_NAME"
          java -cp "$JAR_FILE" "$CLASS_NAME"

  # Job 3: Dependency Review en pull requests
  dependency_review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B package --file Programacion/javaBasics/pom.xml
        # Paso 4: Subir dependency graph para Dependabot
      - name: Dependency graph submission
        uses: actions/dependency-review-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
  
