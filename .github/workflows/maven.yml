name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # Paso 2: Configuración del JDK
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23' 
          distribution: 'temurin'
          cache: maven

      # Paso 3: Construcción con Maven
      - name: Build with Maven
        run: mvn -B package --file Programacion/javaBasics/pom.xml

      # Paso 4: Subir dependency graph para Dependabot
      - name: Upload dependency graph for Dependabot
        uses: advanced-security/maven-dependency-submission-action@v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
